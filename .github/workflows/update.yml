name: Auto Update VPN Sub v2

on:
  schedule:
    - cron: '0 */6 * * *' # Запускаться автоматически каждые 6 часов
  workflow_dispatch: # Позволяет запускать вручную кнопкой

permissions:
  contents: write # Дает право боту изменять файлы в репозитории

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install aiohttp

    - name: Run parser script
      run: python parser.py

    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add sub.txt working_configs.txt
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update top 3 working keys" && git push)
